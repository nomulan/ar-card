<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Syne', sans-serif;
        background: #000;
        overflow: hidden;
      }

      /* ─── TOUR INTRO SPLASH ────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at 30% 40%, #1a0533 0%, #000 70%);
        transition: opacity 0.8s ease, visibility 0.8s ease;
      }

      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, transparent 70%);
        border-radius: 50%;
        animation: pulse-glow 3s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      .splash-content {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 40px;
      }

      .splash-badge {
        display: inline-block;
        background: rgba(168,85,247,0.15);
        border: 1px solid rgba(168,85,247,0.4);
        color: #c084fc;
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        padding: 6px 16px;
        border-radius: 100px;
        margin-bottom: 24px;
        animation: fade-in 0.8s ease 0.3s both;
      }

      .splash-title {
        font-size: clamp(36px, 8vw, 64px);
        font-weight: 800;
        line-height: 1.05;
        color: #fff;
        animation: fade-in 0.8s ease 0.6s both;
      }

      .splash-title span {
        background: linear-gradient(135deg, #a855f7, #ec4899, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .splash-sub {
        margin-top: 16px;
        color: rgba(255,255,255,0.5);
        font-size: 14px;
        line-height: 1.7;
        max-width: 300px;
        margin-inline: auto;
        animation: fade-in 0.8s ease 0.9s both;
      }

      .tour-steps-preview {
        display: flex;
        gap: 10px;
        margin-top: 32px;
        justify-content: center;
        animation: fade-in 0.8s ease 1.1s both;
      }

      .step-chip {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 100px;
        padding: 6px 14px;
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .step-chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #a855f7;
      }

      #start-tour-btn {
        margin-top: 36px;
        position: relative;
        background: none;
        border: none;
        cursor: pointer;
        animation: fade-in 0.8s ease 1.4s both;
      }

      .btn-inner {
        display: flex;
        align-items: center;
        gap: 12px;
        background: linear-gradient(135deg, #7c3aed, #db2777);
        color: white;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.5px;
        padding: 16px 32px;
        border-radius: 100px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 40px rgba(124,58,237,0.5);
      }

      .btn-inner:hover {
        transform: scale(1.05);
        box-shadow: 0 0 60px rgba(124,58,237,0.7);
      }

      .btn-arrow {
        width: 28px;
        height: 28px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        animation: arrow-bounce 1.5s ease-in-out infinite 2s;
      }

      @keyframes arrow-bounce {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(4px); }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ─── TOUR GUIDE PANEL ─────────────────────────────────────── */
      #tour-guide {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-120%);
        z-index: 1000;
        width: min(90vw, 360px);
        background: rgba(10,0,20,0.85);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(168,85,247,0.3);
        border-radius: 20px;
        padding: 16px 20px;
        transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
        box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      }

      #tour-guide.visible {
        transform: translateX(-50%) translateY(0);
      }

      .guide-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .guide-step-num {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        color: #a855f7;
        letter-spacing: 2px;
      }

      .guide-progress {
        display: flex;
        gap: 5px;
      }

      .guide-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        transition: background 0.3s, transform 0.3s;
      }

      .guide-dot.active {
        background: #a855f7;
        transform: scale(1.4);
      }

      .guide-dot.done {
        background: #4ade80;
      }

      .guide-text {
        font-size: 13px;
        color: rgba(255,255,255,0.9);
        line-height: 1.5;
      }

      .guide-text strong { color: #c084fc; }

      .guide-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .guide-btn {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 10px;
        font-family: 'Syne', sans-serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, opacity 0.15s;
      }

      .guide-btn:active { transform: scale(0.95); }

      .guide-btn.primary {
        background: linear-gradient(135deg, #7c3aed, #db2777);
        color: white;
      }

      .guide-btn.secondary {
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .guide-btn.skip {
        flex: none;
        padding: 8px 12px;
        background: none;
        color: rgba(255,255,255,0.3);
        font-size: 11px;
        border: none;
      }

      /* ─── INTERACTION HINT TOASTS ──────────────────────────────── */
      #toast-container {
        position: fixed;
        bottom: 140px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        pointer-events: none;
      }

      .toast {
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
        font-size: 13px;
        padding: 10px 18px;
        border-radius: 100px;
        white-space: nowrap;
        animation: toast-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both,
                   toast-out 0.4s ease 2.5s forwards;
      }

      @keyframes toast-in {
        from { opacity: 0; transform: translateY(10px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes toast-out {
        to { opacity: 0; transform: translateY(-10px) scale(0.9); }
      }

      /* ─── SCAN OVERLAY ─────────────────────────────────────────── */
      #scan-overlay {
        position: fixed;
        inset: 0;
        z-index: 500;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      #scan-overlay.active { display: flex; }

      .scan-frame {
        width: 240px;
        height: 240px;
        position: relative;
      }

      .scan-corner {
        position: absolute;
        width: 30px;
        height: 30px;
        border-color: #a855f7;
        border-style: solid;
        border-width: 0;
      }

      .scan-corner.tl { top: 0; left: 0; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
      .scan-corner.tr { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
      .scan-corner.bl { bottom: 0; left: 0; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
      .scan-corner.br { bottom: 0; right: 0; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

      .scan-line {
        position: absolute;
        left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #a855f7, transparent);
        animation: scan-sweep 2s ease-in-out infinite;
        top: 0;
      }

      @keyframes scan-sweep {
        0% { top: 0; opacity: 1; }
        50% { top: calc(100% - 2px); opacity: 1; }
        51% { opacity: 0; }
        100% { top: 0; opacity: 0; }
      }

      .scan-label {
        position: absolute;
        bottom: -32px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.6);
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        letter-spacing: 2px;
        white-space: nowrap;
        animation: blink 1.5s ease-in-out infinite;
      }

      @keyframes blink { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

      /* ─── SOCIAL BUTTONS ───────────────────────────────────────── */
      #ui-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      #social-links {
        display: none;
        flex-direction: row;
        gap: 12px;
        background: rgba(5,0,15,0.8);
        padding: 12px 18px;
        border-radius: 50px;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(168,85,247,0.25);
        opacity: 0;
        transform: translateY(20px);
        box-shadow: 0 4px 30px rgba(0,0,0,0.5);
      }

      #social-links.show {
        animation: slideUpFade 0.6s ease-out 0.3s forwards;
      }

      @keyframes slideUpFade {
        to { opacity: 1; transform: translateY(0); }
      }

      .social-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background-size: cover;
        background-position: center;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        opacity: 0;
        transform: scale(0);
        position: relative;
        overflow: hidden;
      }

      .social-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0);
        transition: background 0.2s;
        border-radius: 50%;
      }

      .social-btn:hover::before { background: rgba(255,255,255,0.15); }
      .social-btn:hover { transform: scale(1.15) translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
      .social-btn:active { transform: scale(0.92); }

      #social-links.show #instagram-btn { animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 1.3s forwards; }
      #social-links.show #facebook-btn  { animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 1.5s forwards; }
      #social-links.show #linkedin-btn  { animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 1.7s forwards; }

      @keyframes popIn {
        0%   { opacity: 0; transform: scale(0) translateY(-60px); }
        60%  { transform: scale(1.15) translateY(0); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }

      #instagram-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
      #facebook-btn  { background: #1877f2; }
      #linkedin-btn  { background: #0077b5; }

      .social-btn::after {
        content: '';
        display: block;
        width: 26px;
        height: 26px;
        margin: 11px auto;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        filter: brightness(0) invert(1);
      }

      #facebook-btn::after  { background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'); }

      /* ─── CONTROLS BAR ─────────────────────────────────────────── */
      #controls-bar {
        display: none;
        flex-direction: row;
        gap: 10px;
        align-items: center;
      }

      #controls-bar.active { display: flex; }

      .ctrl-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: rgba(5,0,15,0.8);
        border: 1px solid rgba(255,255,255,0.12);
        color: white;
        border-radius: 16px;
        padding: 10px 14px;
        font-family: 'Space Mono', monospace;
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s, transform 0.15s;
        backdrop-filter: blur(10px);
        min-width: 64px;
      }

      .ctrl-btn:active { transform: scale(0.93); }

      .ctrl-btn.active-state {
        border-color: #a855f7;
        background: rgba(168,85,247,0.15);
      }

      .ctrl-icon { font-size: 20px; line-height: 1; }

      .rotate-btn-main {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 2px solid rgba(168,85,247,0.4);
        background: rgba(5,0,15,0.85);
        color: white;
        font-family: 'Space Mono', monospace;
        font-size: 8px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: border-color 0.2s, transform 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        backdrop-filter: blur(10px);
      }

      .rotate-btn-main:active, .rotate-btn-main.spinning {
        border-color: #a855f7;
        background: rgba(168,85,247,0.2);
      }

      .rotate-icon { font-size: 22px; transition: transform 0.3s; }
      .rotate-btn-main.spinning .rotate-icon { animation: spin-icon 0.8s linear infinite; }
      @keyframes spin-icon { to { transform: rotate(360deg); } }

      .info-text {
        color: rgba(255,255,255,0.4);
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        letter-spacing: 1px;
        text-align: center;
        display: none;
        opacity: 0;
        transform: translateY(6px);
      }

      .info-text.show { animation: fadeInUp 0.5s ease-out 1.9s forwards; }

      @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
      }

      /* ─── PARTICLE BURST (click FX) ────────────────────────────── */
      .particle {
        position: fixed;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        animation: particle-fly var(--dur) ease-out forwards;
      }

      @keyframes particle-fly {
        0% { opacity: 1; transform: translate(0,0) scale(1); }
        100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
      }

      /* ─── CONFETTI BURST ────────────────────────────────────────── */
      #confetti-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9990;
        opacity: 0;
        transition: opacity 0.3s;
      }

      /* ─── HEARTBEAT FX ──────────────────────────────────────────── */
      .ripple-ring {
        position: fixed;
        border-radius: 50%;
        border: 2px solid #a855f7;
        pointer-events: none;
        z-index: 9997;
        transform: translate(-50%, -50%);
        animation: ripple-expand 0.8s ease-out forwards;
      }

      @keyframes ripple-expand {
        0% { width: 0; height: 0; opacity: 0.8; }
        100% { width: 120px; height: 120px; opacity: 0; }
      }

      /* ─── LONG-PRESS PROGRESS ──────────────────────────────────── */
      #long-press-ring {
        position: fixed;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9996;
        display: none;
        transform: translate(-50%, -50%);
      }

      #long-press-ring svg {
        width: 80px;
        height: 80px;
        transform: rotate(-90deg);
      }

      #long-press-ring circle {
        fill: none;
        stroke: #a855f7;
        stroke-width: 3;
        stroke-dasharray: 220;
        stroke-dashoffset: 220;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.05s linear;
      }
    </style>

    <script>
      /* ── AFRAME COMPONENTS ─────────────────────────────────────── */
      AFRAME.registerComponent('social-link', {
        schema: { url: {type: 'string', default: ''} },
        init: function() {
          this.el.addEventListener('click', () => {
            if (this.data.url) {
              spawnParticles(window.innerWidth/2, window.innerHeight/2);
              window.open(this.data.url, '_blank');
            }
          });
        }
      });

      AFRAME.registerComponent('proximity-detector', {
        schema: { distance: {type: 'number', default: 1.2}, targetColor: {type: 'color', default: '#00ffff'} },
        init: function() {
          this.camera = document.querySelector('a-camera');
          this.originalColor = this.el.getAttribute('material').color;
          this.isNear = false;
        },
        tick: function() {
          if (!this.camera) return;
          const worldPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(worldPos);
          const camPos = new THREE.Vector3();
          this.camera.object3D.getWorldPosition(camPos);
          const dist = worldPos.distanceTo(camPos);
          if (dist < this.data.distance && !this.isNear) {
            this.isNear = true;
            this.el.setAttribute('animation__color', { property: 'material.color', to: this.data.targetColor, dur: 500 });
          } else if (dist >= this.data.distance && this.isNear) {
            this.isNear = false;
            this.el.setAttribute('animation__colorreset', { property: 'material.color', to: this.originalColor, dur: 500 });
          }
        }
      });

      /* ── TOUR ENGINE ───────────────────────────────────────────── */
      const TOUR_STEPS = [
        {
          title: "STEP 01 / 05",
          text: "Point your camera at the <strong>student ID card</strong> to unlock the AR experience.",
          next: "Got it!"
        },
        {
          title: "STEP 02 / 05",
          text: "A <strong>3D avatar</strong> will appear on the card. Watch it emerge!",
          next: "Cool! Next"
        },
        {
          title: "STEP 03 / 05",
          text: "Tap the <strong>video panel</strong> to play/pause the introduction reel.",
          next: "Next"
        },
        {
          title: "STEP 04 / 05",
          text: "The <strong>social links</strong> will pop up automatically once all elements have appeared!",
          next: "Next"
        },
        {
          title: "STEP 05 / 05",
          text: "Tap any <strong>social icon</strong> to visit the profile. Hold <strong>ROTATE</strong> or tap <strong>COLOR</strong> for fun FX!",
          next: "Start Exploring! 🚀"
        }
      ];

      let tourStep = 0;
      let tourActive = false;

      function startTour() {
        document.getElementById('splash').classList.add('hidden');
        tourActive = true;
        tourStep = 0;
        showTourStep(0);
        document.getElementById('scan-overlay').classList.add('active');
      }

      function showTourStep(idx) {
        const step = TOUR_STEPS[idx];
        const guide = document.getElementById('tour-guide');
        guide.querySelector('.guide-step-num').textContent = step.title;
        guide.querySelector('.guide-text').innerHTML = step.text;
        guide.querySelector('.guide-btn.primary').textContent = step.next;
        guide.querySelectorAll('.guide-dot').forEach((d, i) => {
          d.classList.toggle('active', i === idx);
          d.classList.toggle('done', i < idx);
        });
        guide.classList.remove('visible');
        setTimeout(() => guide.classList.add('visible'), 50);
      }

      function nextTourStep() {
        tourStep++;
        if (tourStep >= TOUR_STEPS.length) endTour();
        else showTourStep(tourStep);
      }

      function endTour() {
        document.getElementById('tour-guide').classList.remove('visible');
        tourActive = false;
        showToast("🎉 You're all set! Scan the card to begin.");
      }

      function skipTour() {
        endTour();
        showToast("Skipped tour — scan the card to start!");
      }

      /* ── INIT ──────────────────────────────────────────────────── */
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector('a-scene');
        const videoAsset = document.querySelector('#myVideo');
        const socialLinks = document.getElementById('social-links');
        const infoText = document.getElementById('info-text');
        const controlsBar = document.getElementById('controls-bar');

        initLongPress(document.querySelector('.rotate-btn-main'));

        sceneEl.addEventListener("targetFound", () => {
          if (tourActive && tourStep <= 1) { tourStep = 1; showTourStep(1); }

          document.getElementById('scan-overlay').classList.remove('active');

          document.querySelectorAll('[animation__fade], [animation__grow], [animation__appear]')
                  .forEach(el => el.emit('card-found'));

          videoAsset.muted = true;
          videoAsset.play();

          celebrateFound();
          spawnParticles(window.innerWidth/2, window.innerHeight/2, 24);
          showToast('🎯 Card detected! AR unlocked');

          // Show controls + socials after all AR elements have appeared
          // Last element: torus at delay 1800 + 1000ms dur ≈ 2800ms
          setTimeout(() => {
            controlsBar.classList.add('active');
            socialLinks.style.display = 'flex';
            infoText.style.display = 'block';
            setTimeout(() => {
              socialLinks.classList.add('show');
              infoText.classList.add('show');
            }, 50);
            if (tourActive && tourStep === 1) { tourStep = 2; showTourStep(2); }
          }, 3000);
        });

        sceneEl.addEventListener("targetLost", () => {
          videoAsset.pause();
          socialLinks.classList.remove('show');
          infoText.classList.remove('show');
          setTimeout(() => {
            socialLinks.style.display = 'none';
            infoText.style.display = 'none';
          }, 600);
          document.getElementById('scan-overlay').classList.add('active');
          showToast('📷 Card lost — re-aim at the card');
        });
      });

      /* ── TOAST SYSTEM ──────────────────────────────────────────── */
      function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3100);
      }

      /* ── PARTICLE FX ───────────────────────────────────────────── */
      function spawnParticles(x, y, count = 12) {
        const colors = ['#a855f7','#ec4899','#f97316','#4ade80','#38bdf8'];
        for (let i = 0; i < count; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
          const dist = 50 + Math.random() * 80;
          p.style.setProperty('--tx', `${Math.cos(angle)*dist}px`);
          p.style.setProperty('--ty', `${Math.sin(angle)*dist}px`);
          p.style.setProperty('--dur', `${0.5 + Math.random()*0.4}s`);
          p.style.left = x + 'px';
          p.style.top = y + 'px';
          p.style.background = colors[Math.floor(Math.random()*colors.length)];
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 1000);
        }
      }

      function spawnRipple(x, y) {
        const r = document.createElement('div');
        r.className = 'ripple-ring';
        r.style.left = x + 'px';
        r.style.top = y + 'px';
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 850);
      }

      /* ── ROTATE ────────────────────────────────────────────────── */
      let rotateInterval;
      let rotateActive = false;

      function startAutoRotate() {
        if (rotateInterval) return;
        rotateActive = true;
        document.querySelector('.rotate-btn-main').classList.add('spinning');
        const model = document.querySelector('#avatar');
        const animate = () => {
          let rot = model.getAttribute('rotation');
          rot.z += 1.5;
          model.setAttribute('rotation', rot);
          rotateInterval = requestAnimationFrame(animate);
        };
        rotateInterval = requestAnimationFrame(animate);
      }

      function stopAutoRotate() {
        cancelAnimationFrame(rotateInterval);
        rotateInterval = null;
        rotateActive = false;
        document.querySelector('.rotate-btn-main').classList.remove('spinning');
      }

      /* ── COLOR CYCLE (red / green only) ───────────────────────── */
      const torusColors = ['#008000', '#ff2020'];
      let colorIdx = 0;
      function cycleColor() {
        colorIdx = (colorIdx + 1) % torusColors.length;
        const torus = document.querySelector('#torus1');
        torus.setAttribute('animation__cyclecolor', { property: 'material.color', to: torusColors[colorIdx], dur: 400 });
        spawnRipple(window.innerWidth/2, window.innerHeight/2 + 80);
        const label = colorIdx === 0 ? 'Green' : 'Red';
        showToast('🎨 Torus: ' + label);
      }

      /* ── CONFETTI BURST ────────────────────────────────────────── */
      function celebrateFound() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.opacity = '1';

        const pieces = Array.from({length: 80}, () => ({
          x: Math.random() * canvas.width,
          y: -10,
          vy: 2 + Math.random() * 4,
          vx: (Math.random() - 0.5) * 3,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.1,
          size: 6 + Math.random() * 8,
          color: ['#a855f7','#ec4899','#f97316','#4ade80','#38bdf8','#fbbf24'][Math.floor(Math.random()*6)]
        }));

        let frame = 0;
        const draw = () => {
          if (frame > 120) { canvas.style.opacity = '0'; return; }
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          pieces.forEach(p => {
            p.y += p.vy;
            p.x += p.vx;
            p.rot += p.rotV;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
            ctx.restore();
          });
          frame++;
          requestAnimationFrame(draw);
        };
        requestAnimationFrame(draw);
      }

      /* ── VIDEO ─────────────────────────────────────────────────── */
      function toggleVideo() {
        const video = document.querySelector('#myVideo');
        video.muted = false;
        if (video.paused) {
          video.play();
          showToast('▶ Playing video...');
        } else {
          video.pause();
          showToast('⏸ Paused');
        }
      }

      /* ── SOCIAL LINKS ──────────────────────────────────────────── */
      function openInstagram() { spawnParticles(window.innerWidth/2, window.innerHeight/2); window.open('https://www.instagram.com/nomuln.n/', '_blank'); }
      function openFacebook()  { spawnParticles(window.innerWidth/2, window.innerHeight/2); window.open('https://www.facebook.com/Kttnami/', '_blank'); }
      function openLinkedIn()  { spawnParticles(window.innerWidth/2, window.innerHeight/2); window.open('https://linkedin.com/in/yourprofile', '_blank'); }

      /* ── LONG-PRESS PROGRESS ───────────────────────────────────── */
      let longPressTimer = null;
      let longPressAnimFrame = null;
      let longPressStart = null;
      const LONG_PRESS_DURATION = 800;

      function initLongPress(btn) {
        const ring = document.getElementById('long-press-ring');
        const circle = ring.querySelector('circle');
        const circumference = 220;

        const startPress = (e) => {
          const rect = btn.getBoundingClientRect();
          const cx = rect.left + rect.width/2;
          const cy = rect.top + rect.height/2;
          ring.style.left = cx + 'px';
          ring.style.top = cy + 'px';
          ring.style.display = 'block';
          longPressStart = performance.now();

          const animate = () => {
            const elapsed = performance.now() - longPressStart;
            const progress = Math.min(elapsed / LONG_PRESS_DURATION, 1);
            circle.style.strokeDashoffset = circumference * (1 - progress);
            if (progress < 1) {
              longPressAnimFrame = requestAnimationFrame(animate);
            }
          };
          longPressAnimFrame = requestAnimationFrame(animate);
          startAutoRotate();
          toggleVideo();
        };

        const endPress = () => {
          ring.style.display = 'none';
          circle.style.strokeDashoffset = circumference;
          cancelAnimationFrame(longPressAnimFrame);
          longPressStart = null;
          stopAutoRotate();
        };

        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('touchstart', startPress, { passive: true });
        btn.addEventListener('mouseup', endPress);
        btn.addEventListener('touchend', endPress);
        btn.addEventListener('mouseleave', endPress);
      }

      /* ── INIT ──────────────────────────────────────────────────── */
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector('a-scene');
        const videoAsset = document.querySelector('#myVideo');
        const socialLinks = document.getElementById('social-links');
        const infoText = document.getElementById('info-text');
        const controlsBar = document.getElementById('controls-bar');

        // Init long press
        initLongPress(document.querySelector('.rotate-btn-main'));

        sceneEl.addEventListener("targetFound", () => {
          console.log('🎯 AR Target detected!');

          if (tourActive && tourStep <= 1) { tourStep = 1; showTourStep(1); }

          document.getElementById('scan-overlay').classList.remove('active');

          document.querySelectorAll('[animation__fade], [animation__grow], [animation__appear]')
                  .forEach(el => el.emit('card-found'));

          videoAsset.muted = true;
          videoAsset.play();

          celebrateFound();
          spawnParticles(window.innerWidth/2, window.innerHeight/2, 24);
          showToast('🎯 Card detected! Move closer to unlock socials');

          // Enable proximity watcher
          const watcher = document.querySelector('[social-proximity-watcher]');
          if (watcher && watcher.components['social-proximity-watcher']) {
            watcher.components['social-proximity-watcher'].cardVisible = true;
          }

          // Show proximity bar + controls after AR loads
          setTimeout(() => {
            document.getElementById('proximity-bar').classList.add('visible');
            controlsBar.classList.add('active');
            if (tourActive && tourStep === 1) { tourStep = 2; showTourStep(2); }
          }, 2000);
        });

        sceneEl.addEventListener("targetLost", () => {
          videoAsset.pause();

          // Disable proximity watcher
          const watcher = document.querySelector('[social-proximity-watcher]');
          if (watcher && watcher.components['social-proximity-watcher']) {
            const comp = watcher.components['social-proximity-watcher'];
            comp.cardVisible = false;
            // Hide socials if they were showing
            if (comp.unlocked) {
              comp.unlocked = false;
              comp._hideSocial();
            }
          }

          document.getElementById('proximity-bar').classList.remove('visible');
          document.getElementById('prox-hint').textContent = '▲ MOVE CLOSER';
          document.getElementById('prox-hint').classList.remove('unlocked');
          document.getElementById('prox-fill').style.width = '0%';

          document.getElementById('scan-overlay').classList.add('active');
          showToast('📷 Card lost — re-aim at the card');
        });
      });
    </script>
  </head>

  <body>

    <!-- ── SPLASH / TOUR START ─────────────────────────────────── -->
    <div id="splash">
      <div class="splash-glow"></div>
      <div class="splash-content">
        <div class="splash-badge">✦ AR BUSINESS CARD EXPERIENCE</div>
        <h1 class="splash-title">Tap Into<br><span>Reality</span></h1>
        <p class="splash-sub">An augmented reality card experience. Point your camera at the card to unlock the magic.</p>

        <div class="tour-steps-preview">
          <div class="step-chip"><span class="dot"></span> Scan</div>
          <div class="step-chip"><span class="dot"></span> Explore</div>
          <div class="step-chip"><span class="dot"></span> Connect</div>
        </div>

        <button id="start-tour-btn" onclick="startTour()">
          <div class="btn-inner">
            Start Guided Tour
            <div class="btn-arrow">→</div>
          </div>
        </button>

        <div style="margin-top:16px;">
          <button onclick="document.getElementById('splash').classList.add('hidden')"
                  style="background:none;border:none;color:rgba(255,255,255,0.35);font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;">
            SKIP INTRO
          </button>
        </div>
      </div>
    </div>

    <!-- ── TOUR GUIDE PANEL ─────────────────────────────────────── -->
    <div id="tour-guide">
      <div class="guide-header">
        <span class="guide-step-num">STEP 01 / 05</span>
        <div class="guide-progress">
          <div class="guide-dot active"></div>
          <div class="guide-dot"></div>
          <div class="guide-dot"></div>
          <div class="guide-dot"></div>
          <div class="guide-dot"></div>
        </div>
      </div>
      <p class="guide-text">Point your camera at the <strong>business card</strong> to unlock the AR experience.</p>
      <div class="guide-actions">
        <button class="guide-btn secondary" onclick="skipTour()">✕ Skip</button>
        <button class="guide-btn primary" onclick="nextTourStep()">Got it!</button>
      </div>
    </div>

    <!-- ── SCAN FRAME OVERLAY ─────────────────────────────────── -->
    <div id="scan-overlay">
      <div class="scan-frame">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
        <div class="scan-line"></div>
        <div class="scan-label">SCANNING FOR TARGET</div>
      </div>
    </div>

    <!-- ── TOAST CONTAINER ───────────────────────────────────────── -->
    <div id="toast-container"></div>

    <!-- ── CONFETTI CANVAS ──────────────────────────────────────── -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ── LONG PRESS RING ──────────────────────────────────────── -->
    <div id="long-press-ring">
      <svg viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="35"/>
      </svg>
    </div>

    <!-- ── UI CONTAINER ─────────────────────────────────────────── -->
    <div id="ui-container">

      <!-- Social Links -->
      <div id="social-links">
        <button id="instagram-btn" class="social-btn" onclick="openInstagram()" title="Instagram"></button>
        <button id="facebook-btn"  class="social-btn" onclick="openFacebook()"  title="Facebook"></button>
        <button id="linkedin-btn"  class="social-btn" onclick="openLinkedIn()"  title="LinkedIn"></button>
      </div>

      <p id="info-text" class="info-text">TAP ICONS TO CONNECT</p>

      <!-- Controls Bar -->
      <div id="controls-bar">

        <!-- Rotate -->
        <button class="rotate-btn-main">
          <span class="rotate-icon">🔄</span>
          <span style="font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;">HOLD</span>
        </button>

        <!-- Color FX -->
        <button id="color-btn" class="ctrl-btn" onclick="cycleColor()">
          <span class="ctrl-icon">🎨</span>
          <span>COLOR</span>
        </button>

      </div>

    </div>

    <!-- ── A-FRAME SCENE ─────────────────────────────────────────── -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="avatarModel" src="./avatar-HcHzJheZ0UuanqKdzMts.glb"></a-asset-item>
        <img id="instaIcon"      src="./instagram.png">
        <img id="linkedinIcon"   src="./LinkedIn_logo_initials.png">
        <img id="FacebookIcon"   src="./Facebook_logo_(square).png">
        <img id="oyutanMedeelel" src="./oyutanMedeelel.png">
        <video id="myVideo"
               src="./MONGOLIAN UNIVERSITY OF SCIENCE AND TECHNOLOGY 2019 (online-video-cutter.com).mp4"
               preload="auto" loop="true" crossorigin="anonymous"
               webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"
                cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!-- Info Panel -->
        <a-image id="info-panel" src="#oyutanMedeelel"
                 width="1.2" height="1.2" position="1.2 0 0"
                 material="opacity: 0"
                 animation__fade="property: material.opacity; from: 0; to: 1; dur: 400; delay: 300; startEvents: card-found">
        </a-image>

        <!-- AR Social Icons -->
        <a-image src="#instaIcon" class="clickable"
                 position="-0.4 -1 0.1" width="0.25" height="0.25"
                 material="opacity: 0"
                 social-link="url: https://www.instagram.com/nomuln.n/"
                 animation__fade="property: material.opacity; from: 0; to: 1; dur: 300; delay: 600; startEvents: card-found">
        </a-image>

        <a-image src="#linkedinIcon" class="clickable"
                 position="0 -1 0.1" width="0.25" height="0.25"
                 material="opacity: 0"
                 social-link="url: https://linkedin.com/in/yourprofile"
                 animation__fade="property: material.opacity; from: 0; to: 1; dur: 300; delay: 800; startEvents: card-found">
        </a-image>

        <a-image src="#FacebookIcon" class="clickable"
                 position="0.4 -1 0.1" width="0.25" height="0.25"
                 material="opacity: 0"
                 social-link="url: https://www.facebook.com/Kttnami/"
                 animation__fade="property: material.opacity; from: 0; to: 1; dur: 300; delay: 1000; startEvents: card-found">
        </a-image>

        <!-- Video (tap to play/pause) -->
        <a-video id="ar-video-entity" src="#myVideo"
                 width="1.4" height="1" position="0 1.4 0.1"
                 material="opacity: 0"
                 class="clickable" onclick="toggleVideo()"
                 animation__fade="property: material.opacity; from: 0; to: 1; dur: 400; delay: 1300; startEvents: card-found">
        </a-video>

        <!-- Avatar + Torus -->
        <a-entity id="avatar-container" position="1 0.8 0.1">

          <a-gltf-model id="avatar" src="#avatarModel"
                        position="0 0 0" scale="0 0 0" rotation="90 0 0"
                        animation__grow="property: scale; from: 0 0 0; to: 0.8 0.8 0.8; dur: 1000; delay: 1600; easing: easeOutBack; startEvents: card-found">
          </a-gltf-model>

          <a-torus id="torus1" color="#008000"
                   radius="0.5" radius-tubular="0.02"
                   rotation="90 0 0" scale="0 0 0"
                   material="opacity: 0.8; transparent: true"
                   proximity-detector="distance: 0.8; targetColor: #00ffff"
                   animation="property: rotation; to: 90 360 0; loop: true; dur: 4000; easing: linear"
                   animation__appear="property: scale; from: 0 0 0; to: 1.2 1.2 1.2; dur: 1000; delay: 1800; easing: easeOutBack; startEvents: card-found">
          </a-torus>

        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
